<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀大会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#b8820a;--gold-dark:#8a6008;--gold-light:#e8a820;
  --bg:#f5f0e8;--surface:#fffdf7;--surface2:#f0ebe0;--border:#d4c4a0;
  --text:#2a2018;--muted:#8a7a60;
  --shadow:0 2px 16px rgba(100,80,30,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* 배경 캔버스 */
#tileCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;}

.wrap{position:relative;z-index:1;text-align:center;padding:40px 24px;max-width:600px;width:100%;}

/* 헤더 */
.title-jp{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(44px,10vw,88px);font-weight:900;
  color:var(--gold-dark);letter-spacing:.18em;line-height:1;
  text-shadow:0 1px 0 rgba(255,255,255,.9),0 3px 8px rgba(100,80,20,.2);
}
.title-sub{font-size:14px;letter-spacing:.5em;color:var(--muted);margin-top:12px;}
.divider{width:240px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto;}

/* 카드 그리드 */
.card-grid{display:flex;flex-direction:column;gap:14px;margin-top:36px;}

.nav-card{
  display:flex;align-items:center;gap:20px;
  background:rgba(255,253,247,.88);
  border:1.5px solid var(--border);border-radius:10px;
  padding:22px 28px;
  text-decoration:none;color:inherit;
  box-shadow:var(--shadow);
  backdrop-filter:blur(4px);
  transition:all .2s;
  text-align:left;
}
.nav-card:hover{
  border-color:var(--gold);
  transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(100,80,30,.18);
  background:rgba(255,251,232,.95);
}
.nav-icon{
  font-size:36px;flex-shrink:0;
  width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border-radius:8px;
  border:1px solid var(--border);
}
.nav-text{}
.nav-title{
  font-family:'Noto Serif JP',serif;
  font-size:18px;font-weight:700;color:var(--gold-dark);
  letter-spacing:.08em;margin-bottom:4px;
}
.nav-desc{font-size:12px;color:var(--muted);letter-spacing:.04em;line-height:1.6;}
.nav-arrow{
  margin-left:auto;font-size:20px;color:var(--border);
  transition:all .2s;flex-shrink:0;
}
.nav-card:hover .nav-arrow{color:var(--gold);transform:translateX(4px);}

/* coming soon */
.nav-card.soon{opacity:.6;cursor:default;pointer-events:none;}
.soon-tag{
  font-size:10px;font-weight:700;padding:2px 7px;
  background:#f0ebe0;color:var(--muted);
  border:1px solid var(--border);border-radius:8px;
  margin-left:6px;letter-spacing:.05em;
}

footer{
  position:relative;z-index:1;
  margin-top:36px;font-size:11px;
  color:var(--muted);letter-spacing:.1em;
}
</style>
</head>
<body>

<canvas id="tileCanvas"></canvas>

<div class="wrap">
  <div class="title-jp">麻雀大会</div>
  <div class="title-sub">MAHJONG TOURNAMENT</div>
  <div class="divider"></div>

  <div class="card-grid">
    <a class="nav-card" href="draw.html">
      <div class="nav-icon">🀄</div>
      <div class="nav-text">
        <div class="nav-title">토너먼트 추첨</div>
        <div class="nav-desc">16인 대진표 추첨 · 실시간 애니메이션 · 점수 입력 및 진출자 배정</div>
      </div>
      <div class="nav-arrow">›</div>
    </a>

    <a class="nav-card" href="betting.html">
      <div class="nav-icon">🎰</div>
      <div class="nav-text">
        <div class="nav-title">우승자 베팅</div>
        <div class="nav-desc">파리뮤추얼 방식 · 성적별 배당 ×1–×8 · 실시간 배당판</div>
      </div>
      <div class="nav-arrow">›</div>
    </a>

    <a class="nav-card soon" href="records.html">
      <div class="nav-icon">📊</div>
      <div class="nav-text">
        <div class="nav-title">성적 기록 <span class="soon-tag">준비 중</span></div>
        <div class="nav-desc">대회 결과 아카이브 · 개인 통계</div>
      </div>
      <div class="nav-arrow">›</div>
    </a>
  </div>
</div>

<footer>© 百合麻雀大会</footer>

<script>
/* 배경 마작패 애니메이션 */
(function(){
  const canvas=document.getElementById('tileCanvas');
  const ctx=canvas.getContext('2d');
  const CHARS=[
    '一萬','二萬','三萬','四萬','五萬','六萬','七萬','八萬','九萬',
    '一筒','二筒','三筒','四筒','五筒','六筒','七筒','八筒','九筒',
    '一索','二索','三索','四索','五索','六索','七索','八索','九索',
    '東','南','西','北','中','發','白',
  ];
  const tiles=[];
  const COUNT=24;

  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize();
  window.addEventListener('resize',resize);

  for(let i=0;i<COUNT;i++){
    tiles.push({
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      char:CHARS[Math.floor(Math.random()*CHARS.length)],
      size:20+Math.random()*24,
      speed:0.16+Math.random()*0.26,
      drift:(Math.random()-.5)*0.12,
      rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-.5)*0.004,
      opacity:0.14+Math.random()*0.22,
    });
  }

  function drawTile(t){
    ctx.save();
    ctx.translate(t.x,t.y);
    ctx.rotate(t.rot);
    const w=t.size*1.5,h=t.size*2.2;
    ctx.fillStyle=`rgba(255,248,220,${t.opacity*0.85})`;
    ctx.strokeStyle=`rgba(140,100,20,${t.opacity*0.9})`;
    ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,4); ctx.fill(); ctx.stroke();
    ctx.strokeStyle=`rgba(140,100,20,${t.opacity*0.35})`;
    ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.roundRect(-w/2+3,-h/2+3,w-6,h-6,2); ctx.stroke();
    ctx.fillStyle=`rgba(60,30,5,${t.opacity*1.1})`;
    const chars=t.char.length===2?[t.char[0],t.char[1]]:[t.char];
    if(chars.length===2){
      ctx.font=`bold ${t.size*0.72}px 'Noto Serif JP',serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(chars[0],0,-t.size*0.38);
      ctx.fillText(chars[1],0, t.size*0.38);
    } else {
      ctx.font=`bold ${t.size*0.85}px 'Noto Serif JP',serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(chars[0],0,0);
    }
    ctx.restore();
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const H=canvas.height,W=canvas.width;
    tiles.forEach(t=>{
      t.y-=t.speed; t.x+=t.drift; t.rot+=t.rotSpeed;
      if(t.y<-60){ t.y=H+40; t.x=Math.random()*W; t.char=CHARS[Math.floor(Math.random()*CHARS.length)]; }
      if(t.x<-60) t.x=W+40;
      if(t.x>W+60) t.x=-40;
      drawTile(t);
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
